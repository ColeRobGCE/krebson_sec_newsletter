name: Krebs Newsletter
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm test
      - name: Run newsletter
        run: pnpm start
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
      - name: Commit dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent-articles.json
          if git diff --staged --quiet; then
            echo "No sent-articles changes to commit."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Skipping push in PR context."
            exit 0
          fi
          git commit -m "chore: update sent articles [skip ci]"
          git pull --rebase
          git push
